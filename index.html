<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #070B11;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(90deg, rgba(0,0,0,0.85), rgba(0,0,0,0.4)),
    url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
}

.hero h1 {
    font-size: 50px;
    color: #C5A059;
    margin-bottom: 10px;
}

.hero p {
    color: #ccc;
}

/* BUTTONS */
.btn {
    display: inline-block;
    margin: 10px;
    padding: 12px 22px;
    border-radius: 5px;
    text-decoration: none;
    font-weight: bold;
    cursor: pointer;
}

.btn-wa { background: #25D366; color: white; }
.btn-tg { background: #229ED9; color: white; }

/* SCROLL ANCHOR */
.scroll {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: #C5A059;
    animation: bounce 2s infinite;
    cursor: pointer;
}

.scroll svg {
    width: 30px;
    height: 30px;
    stroke: #C5A059;
    fill: none;
}

@keyframes bounce {
    0%,100% { transform: translate(-50%,0); }
    50% { transform: translate(-50%,-10px); }
}

/* SECTION */
section {
    padding: 60px 20px;
    text-align: center;
}
</style>
</head>

<body>
